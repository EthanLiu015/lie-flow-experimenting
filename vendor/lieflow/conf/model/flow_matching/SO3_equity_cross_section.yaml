# @package _global_
dataset:
  batch_size: 128
  num_workers: 0

model:
  _target_: lieflow.flow_matching.arrow.model.Flow_SO3
  device: ${device}
  net:
    _target_: lieflow.flow_matching.arrow.net.TransformerTimeEmbedding
    in_dim: 3
    out_dim: 3
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    time_embed_dim: 64
  prior_dist:
    _target_: lieflow.distributions.SO3UniformDistribution
  max_grad_norm: 1.0
  time_sampling: "power"
  time_sampling_kwargs:
    skewness: 5.0

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.01

train:
  epochs: 150

test:
  epoch_interval: 25
  n_steps: 30
